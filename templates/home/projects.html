{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block header %}
<!-- Cabecera -->
{% load static %}
<header class="masthead" style="background-image: url({% static 'img/portfolio-bg.jpg' %})">
    <div class="overlay"></div>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
          <div class="site-heading">
            <h1>Portafolio</h1>
            <span class="subheading">Currículo</span>
          </div>
        </div>
      </div>
    </div>
</header>
{% endblock %}

{% block content %}
<!-- Contenido Principal -->
{% for project in projects %}
<div class="row project">  	
  <div class="col-lg-3 col-md-4 offset-lg-1">
      <img class="img-fluid" src="{% static 'img/portfolio-bg.jpg' %}" alt="">
  </div>
<div class="col-lg-7 col-md-8">
      <h2 class="section-heading title">{{ project.name }}</h2>   
  <p>{{ project.description }}</p>
  <p><a href="{{ project.url }}" target="_blank">Más información</a></p>
  </div>
</div>
{% endfor %}
{% endblock content %}
